- hosts: localhost
  roles:
    - geerlingguy.docker
  become: true

- hosts: localhost
  become: true
  roles:
    - geerlingguy.git
    - githubixx.kubectl
    - gantsign.minikube
    - geerlingguy.helm
  vars:
    minikube_version: '1.38.1'
    kubectl_version: "1.36.2"
    helm_version: 'v4.2.2'
    helm_platform: linux
    helm_arch: amd64
